<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Define the gradient for the border -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89AACC" />
      <stop offset="100%" stop-color="#4E85BF" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle with transparent background outside -->
  <circle cx="50" cy="50" r="45" fill="#0C0C0C" stroke="url(#borderGradient)" stroke-width="4.5" />
  
  <!-- Italic text "SM" centered -->
  <text 
    x="48" 
    y="58" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="28" 
    font-style="italic" 
    font-weight="bold"
    fill="#D7E2EA" 
    text-anchor="middle"
    letter-spacing="-1"
  >SM</text>
</svg>
